  <title>Guest Guide</title>
  <style>
    :root {
      --bg: #eef0f4;
      --card: #f7f7f8;
      --text: #18213c;
      --muted: #6b7890;
      --border: #273454;
      --primary: #0f1b3d;
      --primary-hover: #162754;
      --shadow: 0 8px 24px rgba(15, 27, 61, 0.08);
      --radius-xl: 26px;
      --radius-lg: 20px;
      --radius-md: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 22px;
    }

    .hero {
      background: var(--card);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }

    .hero img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
    }

    .hero-content {
      padding: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
    }

    .space-top {
      margin-top: 18px;
    }

    .button-grid {
      display: grid;
      gap: 14px;
    }

    .lang-grid {
      grid-template-columns: repeat(5, minmax(0, 1fr));
      margin-top: 26px;
    }

    .lang-btn,
    .action-btn,
    .doc-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 62px;
      padding: 14px 18px;
      border-radius: 22px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: 0.2s ease;
      cursor: pointer;
    }

    .lang-btn {
      background: transparent;
      color: var(--text);
      border: 2px solid var(--border);
    }

    .lang-btn:hover,
    .lang-btn.active {
      background: #e9edf5;
    }

    .primary-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 22px;
    }

    .action-btn {
      background: var(--primary);
      color: #fff;
      border: 2px solid var(--border);
    }

    .action-btn:hover {
      background: var(--primary-hover);
    }

    .docs-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-top: 14px;
    }

    .doc-btn {
      background: transparent;
      color: var(--text);
      border: 2px solid var(--border);
    }

    .doc-btn:hover {
      background: #eef2f8;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 22px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 34px;
    }

    .info-stack {
      display: grid;
      gap: 24px;
    }

    .info-item .label {
      display: block;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .info-item .value {
      font-size: 17px;
      color: var(--text);
      margin-bottom: 2px;
    }

    .info-item .note {
      font-size: 14px;
      color: var(--muted);
    }

    h2 {
      margin: 0 0 12px;
      font-size: 28px;
      letter-spacing: -0.02em;
    }

    h3 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    ul {
      margin: 0;
      padding-left: 22px;
    }

    li + li {
      margin-top: 8px;
    }

    .muted {
      color: var(--muted);
    }

    .hidden {
      display: none !important;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 8px 0 24px;
    }

    @media (max-width: 900px) {
      .docs-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .info-grid {
        grid-template-columns: 1fr;
        gap: 24px;
      }
    }

    @media (max-width: 700px) {
      .wrap {
        padding: 14px;
      }

      .hero img {
        height: 220px;
      }

      .hero-content,
      .card {
        padding: 20px;
      }

      .lang-grid,
      .primary-grid,
      .docs-grid {
        grid-template-columns: 1fr;
      }

      h2 {
        font-size: 24px;
      }
    }
  </style>
</head>

    function hasContentValue(value) {
      return value !== null && value !== undefined && String(value).trim() !== "";
    }

    function renderList(id, items) {
      const list = document.getElementById(id);
      if (!list) return;
      list.innerHTML = (items || []).map(item => `<li>${item}</li>`).join("");
    }

    function getDocumentForLang(docGroup, lang) {
      if (!docGroup) return "";
      if (typeof docGroup === "string") return docGroup;
      if (docGroup[lang]) return docGroup[lang];
      return docGroup.fallback || "";
    }

    function hasContentArray(arr) {
      return Array.isArray(arr) && arr.length > 0;
    }

    function setHidden(id, hidden) {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.toggle("hidden", hidden);
    }

    function setText(id, value) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = value || "";
    }

    function setTextOrHide(id, value) {
      const el = document.getElementById(id);
      if (!el) return;

      if (value && String(value).trim() !== "") {
        el.textContent = value;
        el.classList.remove("hidden");
      } else {
        el.textContent = "";
        el.classList.add("hidden");
      }
    }

    function setTextOrClear(id, value) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = hasContentValue(value) ? value : "";
    }

    function setInfoItemVisibility(itemId, labelId, valueId, labelText, valueText, noteId, noteText) {
      const hasValue = hasContentValue(valueText);
      const hasNote = hasContentValue(noteText);

      setTextOrClear(labelId, hasValue || hasNote ? labelText : "");
      setTextOrClear(valueId, valueText);

      if (noteId) {
        setTextOrHide(noteId, noteText);
      }

      setHidden(itemId, !(hasValue || hasNote));
    }

    function setButtonVisibility(id, href) {
      const el = document.getElementById(id);
      if (!el) return;

      if (!href || href === "#") {
        el.classList.add("hidden");
        el.removeAttribute("href");
      } else {
        el.classList.remove("hidden");
        el.href = href;
      }
    }

    function updateInfoCardVisibility() {
      const itemIds = [
        "address-item",
        "checkin-item",
        "checkout-item",
        "wifi-item",
        "contact-item",
        "parking-item"
      ];

      const hasVisibleItems = itemIds.some(id => {
        const el = document.getElementById(id);
        return el && !el.classList.contains("hidden");
      });

      setHidden("info-card", !hasVisibleItems);
    }

    function updateDocsGridVisibility() {
      const docsGrid = document.getElementById("docs-grid");
      if (!docsGrid) return;
      const hasVisibleButtons = Array.from(docsGrid.querySelectorAll(".doc-btn"))
        .some(btn => !btn.classList.contains("hidden"));

      if (hasVisibleButtons) {
        docsGrid.classList.remove("hidden");
      } else {
        docsGrid.classList.add("hidden");
      }
    }

    function setLanguage(lang) {
      const normalizedLang = CONTENT[lang] ? lang : "it";
      const t = CONTENT[normalizedLang];
      const coverImage = document.getElementById("cover-image");
      const safeDocuments = PROPERTY.documents || {};

      document.documentElement.lang = normalizedLang;
      document.title = `${PROPERTY.apartmentName || t.pageTitle} - ${t.pageTitle}`;

      if (coverImage) {
        if (hasContentValue(PROPERTY.coverImage)) {
          coverImage.src = PROPERTY.coverImage;
          coverImage.alt = PROPERTY.apartmentName || t.pageTitle;
          coverImage.classList.remove("hidden");
        } else {
          coverImage.removeAttribute("src");
          coverImage.alt = "";
          coverImage.classList.add("hidden");
        }
      }

      setText("apartment-name", PROPERTY.apartmentName);

      setText("subtitle-1", t.subtitle1);
      setText("subtitle-2", t.subtitle2);

      setText("map-btn", t.mapBtn);
      setButtonVisibility("map-btn", PROPERTY.mapsUrl || "");

      setText("whatsapp-btn", t.whatsappBtn);
      setButtonVisibility("whatsapp-btn", PROPERTY.whatsappUrl || "");

      const rulesDoc = getDocumentForLang(safeDocuments.rules, normalizedLang);
      const arrivalDoc = getDocumentForLang(safeDocuments.arrival, normalizedLang);
      const petDoc = getDocumentForLang(safeDocuments.pet, normalizedLang);
      const extraDoc = getDocumentForLang(safeDocuments.extra, normalizedLang);

      setText("rules-btn", t.rulesBtn);
      setButtonVisibility("rules-btn", rulesDoc);

      setText("arrival-btn", t.arrivalBtn);
      setButtonVisibility("arrival-btn", arrivalDoc);

      setText("pet-btn", t.petBtn);
      setButtonVisibility("pet-btn", petDoc);

      setText("extra-btn", t.extraBtn);
      setButtonVisibility("extra-btn", extraDoc);

      updateDocsGridVisibility();

      const wifiPasswordText = hasContentValue(PROPERTY.wifiPassword)
        ? `${t.wifiPasswordLabel}: ${PROPERTY.wifiPassword}`
        : "";

      setInfoItemVisibility("address-item", "label-address", "address-value", t.labelAddress, PROPERTY.address);
      setInfoItemVisibility("checkin-item", "label-checkin", "checkin-value", t.labelCheckin, PROPERTY.checkin);
      setInfoItemVisibility("checkout-item", "label-checkout", "checkout-value", t.labelCheckout, PROPERTY.checkout);
      setInfoItemVisibility("wifi-item", "label-wifi", "wifi-name", t.wifiLabel, PROPERTY.wifiName, "wifi-password", wifiPasswordText);
      setInfoItemVisibility("contact-item", "label-contact", "contact-value", t.labelContact, PROPERTY.whatsappDisplay, "contact-note", t.contactNote);
      setInfoItemVisibility("parking-item", "label-parking", "parking-short", t.labelParking, t.parkingShort);

      updateInfoCardVisibility();

      const hasAccessContent = hasContentValue(t.accessText) || hasContentValue(t.accessNote);
      setTextOrClear("access-title", hasAccessContent ? t.accessTitle : "");
      setTextOrClear("access-text", t.accessText);
      setTextOrHide("access-note", t.accessNote);
      setHidden("access-card", !hasAccessContent);

      const hasRulesContent = hasContentArray(t.rulesList);
      setTextOrClear("rules-title", hasRulesContent ? t.rulesTitle : "");
      renderList("rules-list", hasRulesContent ? t.rulesList : []);
      setHidden("rules-card", !hasRulesContent);

      const hasWasteContent = hasContentValue(t.wasteText) || hasContentValue(t.wasteNote);
      setTextOrClear("waste-title", hasWasteContent ? t.wasteTitle : "");
      setTextOrClear("waste-text", t.wasteText);
      setTextOrHide("waste-note", t.wasteNote);
      setHidden("waste-card", !hasWasteContent);

      const hasCheckoutContent = hasContentArray(t.checkoutList);
      setTextOrClear("checkout-title", hasCheckoutContent ? t.checkoutTitle : "");
      renderList("checkout-list", hasCheckoutContent ? t.checkoutList : []);
      setHidden("checkout-card", !hasCheckoutContent);

      const hasRestaurants = hasContentArray(t.restaurantsList);
      const hasAttractions = hasContentArray(t.attractionsList);

      const suggestionsCard = document.getElementById("suggestions-card");
      const restaurantsBlock = document.getElementById("restaurants-block");
      const attractionsBlock = document.getElementById("attractions-block");

      if (hasRestaurants || hasAttractions) {
        suggestionsCard.classList.remove("hidden");
        setText("suggestions-title", t.suggestionsTitle);

        if (hasRestaurants) {
          restaurantsBlock.classList.remove("hidden");
          setText("restaurants-title", t.restaurantsTitle);
          renderList("restaurants-list", t.restaurantsList);
        } else {
          restaurantsBlock.classList.add("hidden");
          renderList("restaurants-list", []);
        }

        if (hasAttractions) {
          attractionsBlock.classList.remove("hidden");
          setText("attractions-title", t.attractionsTitle);
          renderList("attractions-list", t.attractionsList);
        } else {
          attractionsBlock.classList.add("hidden");
          renderList("attractions-list", []);
        }
      } else {
        suggestionsCard.classList.add("hidden");
      }

      const hasCoordinates = hasContentValue(PROPERTY.coordinates);
      const hasMapContent = hasContentValue(t.mapText) || hasCoordinates;

      setTextOrClear("map-title", hasMapContent ? t.mapTitle : "");
      setTextOrClear("map-text", t.mapText);
      setTextOrClear("coords-label", hasCoordinates ? t.coordsLabel : "");
      setTextOrClear("coords-value", PROPERTY.coordinates);
      setHidden("coords-row", !hasCoordinates);
      setHidden("map-card", !hasMapContent);

      setText("footer-text", t.footerText);

      document.querySelectorAll(".lang-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.lang === normalizedLang);
      });

      try {
        localStorage.setItem("guestGuideLang", normalizedLang);
      } catch (e) {}
    }

    document.querySelectorAll(".lang-btn").forEach(btn => {
      btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
    });

    let savedLang = "it";
    try {
      savedLang = localStorage.getItem("guestGuideLang") || "it";
    } catch (e) {}

    setLanguage(savedLang);
  </script>
